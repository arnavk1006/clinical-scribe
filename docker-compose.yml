services:
  # Redis cache/queue server for BullMQ
  redis:
    image: redis:7-alpine
    container_name: clinical-scribe-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: always

  # Backend Hono API Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-scribe-backend
    command: ["sh", "-c", "if [ ! -f ./apps/backend/data/clinical-scribe.sqlite ]; then IS_NEW=true; fi && bun run db:migrate && if [ \"$$IS_NEW\" = \"true\" ]; then bun run db:seed; fi && bun run dev:backend"]
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"
    environment:
      - PORT=${PORT:-3000}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - DATABASE_PATH=${DATABASE_PATH:-./data/clinical-scribe.sqlite}
      - WHISPER_SERVER_URL=http://host.docker.internal:8080
      - UPLOAD_DIR=${UPLOAD_DIR:-/private/tmp}
      - MSGPACKR_NATIVE_ACCELERATION_DISABLED=${MSGPACKR_NATIVE_ACCELERATION_DISABLED:-true}
    depends_on:
      - redis
    volumes:
      - app_data:/app/apps/backend/data
      - tmp_uploads:/private/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Frontend Vite Dev Server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-scribe-frontend
    command: ["bun", "run", "dev:frontend"]
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-5173}:5173"
    environment:
      - BACKEND_URL=http://backend:3000
      - MSGPACKR_NATIVE_ACCELERATION_DISABLED=${MSGPACKR_NATIVE_ACCELERATION_DISABLED:-true}
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Drizzle Studio Database Viewer
  db-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinical-scribe-db-studio
    working_dir: /app/apps/backend
    command: ["nodejs", "/app/node_modules/drizzle-kit/bin.cjs", "studio", "--host", "0.0.0.0", "--port", "4983"]
    ports:
      - "127.0.0.1:4983:4983"
    volumes:
      - app_data:/app/apps/backend/data
    depends_on:
      - backend


volumes:
  redis_data:
  app_data:
  tmp_uploads:
